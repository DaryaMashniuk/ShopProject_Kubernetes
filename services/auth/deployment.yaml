apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  namespace: app-service-ns
  labels:
    app: authservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authservice
  template:
    metadata:
      labels:
        app: authservice
    spec:
      containers:
        - name: authservice
          image: daryamashnyuk/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 8082

          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx300M -Xms200M -XX:+UseSerialGC -Dspring.main.lazy-initialization=true"

          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-service-secret
          
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 150
            periodSeconds: 20
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 120
            periodSeconds: 10


          resources:
            requests:
              memory: "400Mi"
              cpu: "200m"
            limits:
              memory: "800Mi"