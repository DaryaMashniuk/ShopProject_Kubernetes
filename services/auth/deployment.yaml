apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  labels:
    app: authservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authservice
  template:
    metadata:
      labels:
        app: authservice
    spec:
      containers:
        - name: authservice
          image: daryamashnyuk/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 8082

          envFrom:
            - configMapRef:
              name: auth-config
            - secretRef:
              name: auth-service-secret

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 5