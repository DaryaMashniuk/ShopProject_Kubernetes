apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: order-postgres
  namespace: app-service-ns
spec:
  serviceName: order-postgres
  replicas: 1

  selector:
    matchLabels:
      app: order-postgres
  
  template:
    metadata:
      labels:
        app: order-postgres
    spec:
      containers:
        - name: order-postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          
          envFrom:
            - secretRef:
                name: order-postgres-secret
          
          volumeMounts:
            - name: order-postgres-storage
              mountPath: /var/lib/postgresql/data

          livenessProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
              - "sh"
              - "-c"
              - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

  volumeClaimTemplates:
    - metadata:
        name: order-postgres-storage
      spec:
        
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi