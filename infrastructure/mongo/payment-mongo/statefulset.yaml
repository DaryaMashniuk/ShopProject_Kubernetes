apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: payment-mongo
  namespace: app-service-ns
spec:
  serviceName: payment-mongo
  replicas: 1

  selector:
    matchLabels:
      app: payment-mongo
  
  template:
    metadata:
      labels:
        app:  payment-mongo
    spec:
      containers:
        - name: payment-mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
          
          envFrom:
            - secretRef:
              name: payment-mongo-secret
          
          volumeMounts:
            - name: payment-mongo-storage
              mountPath: /data/db

          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')

          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')

  volumeClaimTemplates:
    - metadata:
        name: payment-mongo-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi