apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: app-service-ns
spec:
  serviceName: kafka
  replicas: 1

  selector:
    matchLabels:
      app: kafka
  
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - containerPort: 9092
            - containerPort: 9093
          
          envFrom:
            - configMapRef:
                name: kafka-config
          
          volumeMounts:
            - name: kafka-storage
              mountPath: /var/lib/kafka/data

          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 10
            periodSeconds: 5

  volumeClaimTemplates:
    - metadata:
        name: kafka-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi