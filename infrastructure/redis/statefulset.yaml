apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: app-service-ns
spec:
  serviceName: redis
  replicas: 1

  selector:
    matchLabels:
      app: redis
  
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          args: ["redis-server", "--save", "60", "1"]
          ports:
            - containerPort: 6379
          
          volumeMounts:
            - name: redis-storage
              mountPath: /data


  volumeClaimTemplates:
    - metadata:
        name: redis-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi